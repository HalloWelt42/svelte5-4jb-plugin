# Plugin coordinates
pluginGroup=de.hallowelt.svelte.lang
pluginVersion=0.3.0

# Lowest supported IDE build (261 = 2026.1 line). No upper bound is enforced.
pluginSinceBuild=261

# Build against a locally installed JetBrains IDE. This gives an exact API match
# with the IDE you run and avoids downloading a multi-GB platform artifact.
# Point this at any installed JS-capable IDE (PhpStorm, WebStorm, IntelliJ IDEA
# Ultimate, PyCharm Professional). Override on the command line with
#   -PplatformLocalPath=/path/to/YourIde.app
platformLocalPath=/Users/alpha/Applications/PhpStorm.app

org.gradle.jvmargs=-Xmx3g
org.gradle.caching=true
org.gradle.configuration-cache=false

kotlin.stdlib.default.dependency=false
